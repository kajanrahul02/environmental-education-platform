<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Gamified Environmental Education Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#2e7d32;
    font-size:36px;
}

.header p{
    color:#666;
}

.leaderboard-card{
    background:white;
    border-radius:15px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#2e7d32;
    color:white;
}

th{
    padding:18px;
    text-align:center;
}

td{
    padding:16px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f5f5;
}

.rank1{
    color:gold;
    font-weight:bold;
}

.rank2{
    color:silver;
    font-weight:bold;
}

.rank3{
    color:#cd7f32;
    font-weight:bold;
}

.badge{
    background:#e8f5e9;
    color:#2e7d32;
    padding:7px 15px;
    border-radius:20px;
    font-size:14px;
}

.no-data{
    text-align:center;
    padding:30px;
    color:gray;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🏆 Global Leaderboard</h1>
        <p>Top Environmental Champions</p>
    </div>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Student Name</th>
                    <th>Score</th>
                    <th>Badge</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="leaderboardBody">
            </tbody>

        </table>
    </div>

</div>

<script>

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

leaderboard.sort((a,b)=>b.score-a.score);

const body = document.getElementById("leaderboardBody");

if(leaderboard.length===0){

body.innerHTML=`
<tr>
<td colspan="5" class="no-data">
No records found.
</td>
</tr>
`;

}
else{

leaderboard.forEach((user,index)=>{

let badge="Eco Learner";

if(user.score>=90)
badge="🌍 Eco Champion";
else if(user.score>=70)
badge="🌱 Green Hero";
else if(user.score>=50)
badge="♻ Sustainability Expert";

let rankClass="";

if(index===0)
rankClass="rank1";
else if(index===1)
rankClass="rank2";
else if(index===2)
rankClass="rank3";

body.innerHTML+=`
<tr>
<td class="${rankClass}">#${index+1}</td>
<td>${user.name}</td>
<td>${user.score}</td>
<td><span class="badge">${badge}</span></td>
<td>${user.date}</td>
</tr>
`;

});

}

</script>

</body>
</html>
